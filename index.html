<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Pure Interactive Art</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #050505;
            color: #fff;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }
        canvas {
            position: absolute;
            top: 0;
            left: 0;
            z-index: 0;
            touch-action: none;
        }
    </style>
</head>
<body>

    <canvas id="artCanvas"></canvas>

    <script>
        const canvas = document.getElementById('artCanvas');
        const ctx = canvas.getContext('2d');

        let width, height;
        let particles = [];
        let isTouching = false;
        let config = {
            colors: ['#3b82f6', '#8b5cf6', '#ec4899'],
            speed: 1.5,
            complexity: 6,
            size: 3,
            style: 'fluid',
            background: '#050505'
        };

        let isAutoCycling = true;
        let autoCycleSeconds = 0;
        const CYCLE_DURATION = 10;

        const PALETTES = [
            ['#3b82f6', '#8b5cf6', '#ec4899'],
            ['#10b981', '#3b82f6', '#06b6d4'],
            ['#f59e0b', '#ef4444', '#f97316'],
            ['#ffffff', '#9ca3af', '#374151'],
            ['#a855f7', '#ec4899', '#f43f5e'],
            ['#22c55e', '#84cc16', '#10b981'],
            ['#eab308', '#f97316', '#ef4444'],
            ['#6366f1', '#4f46e5', '#4338ca']
        ];

        function init() {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
            ctx.fillStyle = config.background;
            ctx.fillRect(0, 0, width, height);
            applyRandomConfig();
        }
        window.addEventListener('resize', init);

        function applyRandomConfig() {
            const styles = ['fluid', 'chaotic', 'geometric', 'float'];
            config.colors = PALETTES[Math.floor(Math.random() * PALETTES.length)];
            config.style = styles[Math.floor(Math.random() * styles.length)];
            config.speed = 0.5 + Math.random() * 2.5;
            config.complexity = 5 + Math.floor(Math.random() * 8);
            config.size = 2 + Math.random() * 6;
            createParticles();
        }

        // --- Interaction Logic ---
        function spawnInteractionParticles(x, y) {
            for (let i = 0; i < 5; i++) {
                const p = new Particle();
                p.x = x;
                p.y = y;
                p.vx = (Math.random() - 0.5) * (config.speed * 4);
                p.vy = (Math.random() - 0.5) * (config.speed * 4);
                particles.push(p);
            }
        }

        const handleInteraction = (e) => {
            if (!isTouching) return;
            const x = e.clientX || (e.touches && e.touches[0].clientX);
            const y = e.clientY || (e.touches && e.touches[0].clientY);
            if (x && y) spawnInteractionParticles(x, y);
        };

        canvas.addEventListener('mousedown', () => isTouching = true);
        window.addEventListener('mouseup', () => isTouching = false);
        canvas.addEventListener('mousemove', handleInteraction);
        
        canvas.addEventListener('touchstart', (e) => { 
            isTouching = true; 
            handleInteraction(e);
        }, {passive: false});
        window.addEventListener('touchend', () => isTouching = false);
        canvas.addEventListener('touchmove', handleInteraction, {passive: false});

        class Particle {
            constructor() { this.reset(); }
            reset() {
                this.x = Math.random() * width;
                this.y = Math.random() * height;
                this.vx = (Math.random() - 0.5) * config.speed;
                this.vy = (Math.random() - 0.5) * config.speed;
                this.history = [];
                this.maxHistory = Math.floor(Math.random() * 15) + 10;
                this.color = config.colors[Math.floor(Math.random() * config.colors.length)];
                this.size = Math.random() * config.size + 1;
            }
            update() {
                this.history.push({x: this.x, y: this.y});
                if (this.history.length > this.maxHistory) this.history.shift();
                
                if (config.style === 'fluid') {
                    const n = Math.sin(this.x * 0.003) + Math.cos(this.y * 0.003);
                    this.vx += Math.cos(n * Math.PI) * 0.25;
                    this.vy += Math.sin(n * Math.PI) * 0.25;
                } else if (config.style === 'chaotic') {
                    this.vx += (Math.random() - 0.5) * 1.5;
                    this.vy += (Math.random() - 0.5) * 1.5;
                } else if (config.style === 'float') {
                    this.vy -= 0.05;
                    this.vx += Math.sin(Date.now() * 0.001 + this.x) * 0.05;
                }
                
                this.x += this.vx; this.y += this.vy;
                this.vx *= 0.96; this.vy *= 0.96;

                if (particles.length > 800 && this.history.length > 5) {
                    this.history.shift();
                }

                if (this.x < -100 || this.x > width + 100 || this.y < -100 || this.y > height + 100) {
                    if (particles.length < 300) this.reset();
                    else return false;
                }
                return true;
            }
            draw() {
                if (this.history.length < 2) return;
                ctx.beginPath();
                ctx.strokeStyle = this.color;
                ctx.lineWidth = this.size;
                ctx.lineCap = 'round';
                ctx.lineJoin = 'round';
                ctx.moveTo(this.history[0].x, this.history[0].y);
                for (let i = 1; i < this.history.length; i++) ctx.lineTo(this.history[i].x, this.history[i].y);
                ctx.stroke();
            }
        }

        function createParticles() {
            particles = [];
            const count = 60 + (config.complexity * 20);
            for (let i = 0; i < count; i++) particles.push(new Particle());
        }

        // Auto Cycle Timer
        setInterval(() => {
            if (isAutoCycling) {
                autoCycleSeconds++;
                if (autoCycleSeconds >= CYCLE_DURATION) {
                    autoCycleSeconds = 0;
                    applyRandomConfig();
                }
            }
        }, 1000);

        function animate() {
            ctx.fillStyle = config.background;
            ctx.globalAlpha = 0.08;
            ctx.fillRect(0, 0, width, height);
            ctx.globalAlpha = 1.0;

            for (let i = particles.length - 1; i >= 0; i--) {
                const alive = particles[i].update();
                if (!alive) {
                    particles.splice(i, 1);
                    continue;
                }
                particles[i].draw();
            }

            requestAnimationFrame(animate);
        }

        init();
        animate();
    </script>
</body>
</html>
