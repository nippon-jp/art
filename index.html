<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AI Art Canvas - Mobile Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #050505;
            color: #fff;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }
        canvas {
            position: absolute;
            top: 0;
            left: 0;
            z-index: 0;
            touch-action: none;
        }
        .glass {
            background: rgba(15, 15, 15, 0.7);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        .recording-dot {
            width: 10px;
            height: 10px;
            background-color: #ef4444;
            border-radius: 50%;
            display: inline-block;
            margin-right: 6px;
            animation: pulse 1s infinite;
        }
        @keyframes pulse {
            0% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.4; transform: scale(1.2); }
            100% { opacity: 1; transform: scale(1); }
        }
        /* Mobile adjustment */
        @media (max-width: 640px) {
            .control-panel {
                width: 95%;
                bottom: 10px;
            }
        }
    </style>
</head>
<body>

    <canvas id="artCanvas"></canvas>

    <!-- Status Bar -->
    <div id="uiOverlay" class="fixed top-4 left-0 right-0 z-20 flex justify-center pointer-events-none">
        <div id="statusIndicator" class="hidden glass px-4 py-2 rounded-full flex items-center text-xs font-medium animate-bounce shadow-lg">
            <span id="indicatorDot" class="recording-dot"></span> <span id="indicatorText">録画中...</span>
            <span id="timer" class="ml-2 font-mono">00:00</span>
        </div>
    </div>

    <!-- Main Controls -->
    <div class="fixed bottom-6 left-0 right-0 z-20 flex justify-center px-4">
        <div class="control-panel glass p-4 rounded-[2.5rem] w-full max-w-lg pointer-events-auto shadow-2xl transition-all duration-500">
            
            <div id="expandArea" class="hidden mb-4 space-y-4">
                <div class="relative">
                    <textarea 
                        id="userInput" 
                        placeholder="イメージを言葉に（例：桜吹雪の舞う青空）" 
                        class="w-full bg-transparent border-b border-gray-700 focus:border-indigo-400 p-2 text-base outline-none resize-none h-20 transition-colors pr-12 text-white"
                    ></textarea>
                    <button id="micBtn" class="absolute right-1 bottom-2 p-3 text-gray-400 hover:text-indigo-400 transition-colors">
                        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2a3 3 0 0 0-3 3v7a3 3 0 0 0 6 0V5a3 3 0 0 0-3-3Z"/><path d="M19 10v2a7 7 0 0 1-14 0v-2"/><line x1="12" x2="12" y1="19" y2="22"/></svg>
                    </button>
                </div>

                <div class="grid grid-cols-2 gap-2">
                    <button id="saveImgBtn" class="py-2 px-4 glass rounded-xl text-xs font-semibold hover:bg-white/10 flex items-center justify-center gap-2">
                        <svg width="16" height="16" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
                        画像を保存
                    </button>
                    <button id="record10Btn" class="py-2 px-4 glass rounded-xl text-xs font-semibold hover:bg-white/10 flex items-center justify-center gap-2">
                        <svg width="16" height="16" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M15 10l4.553-2.276A1 1 0 0121 8.618v6.764a1 1 0 01-1.447.894L15 14M5 18h8a2 2 0 002-2V8a2 2 0 00-2-2H5a2 2 0 00-2 2v8a2 2 0 002 2z" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
                        10秒動画保存
                    </button>
                </div>
            </div>

            <div class="flex items-center gap-2">
                <button id="toggleExpand" class="p-3 text-gray-400">
                    <svg id="expandIcon" width="20" height="20" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M5 15l7-7 7 7" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
                </button>
                <div id="statusLabel" class="flex-1 text-[10px] text-gray-500 uppercase tracking-widest truncate">イメージを入力してください</div>
                <button 
                    id="generateBtn" 
                    class="bg-white text-black px-6 py-2 rounded-full font-bold text-sm shadow-lg hover:scale-105 active:scale-95 transition-all"
                >
                    生成
                </button>
            </div>
        </div>
    </div>

    <!-- Loading -->
    <div id="loadingBar" class="hidden fixed bottom-0 left-0 right-0 h-1 bg-indigo-500 z-30">
        <div class="h-full bg-white w-full animate-[shimmer_2s_infinite]"></div>
    </div>

    <script>
        const apiKey = "";
        const canvas = document.getElementById('artCanvas');
        const ctx = canvas.getContext('2d');
        const userInput = document.getElementById('userInput');
        const generateBtn = document.getElementById('generateBtn');
        const micBtn = document.getElementById('micBtn');
        const saveImgBtn = document.getElementById('saveImgBtn');
        const record10Btn = document.getElementById('record10Btn');
        const toggleExpand = document.getElementById('toggleExpand');
        const expandArea = document.getElementById('expandArea');
        const expandIcon = document.getElementById('expandIcon');
        const statusLabel = document.getElementById('statusLabel');
        const statusIndicator = document.getElementById('statusIndicator');
        const timerDisplay = document.getElementById('timer');
        const indicatorText = document.getElementById('indicatorText');

        let width, height;
        let particles = [];
        let config = {
            colors: ['#333', '#666', '#999'],
            speed: 1.2,
            complexity: 6,
            size: 4,
            style: 'fluid',
            background: '#050505'
        };

        // Recording state
        let mediaRecorder;
        let recordedChunks = [];
        let isRecording = false;
        let startTime;
        let timerInterval;

        function init() {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
            ctx.fillStyle = config.background;
            ctx.fillRect(0, 0, width, height);
        }
        window.addEventListener('resize', init);
        init();

        // --- Particle Engine ---
        class Particle {
            constructor() { this.reset(); }
            reset() {
                this.x = Math.random() * width;
                this.y = Math.random() * height;
                this.vx = (Math.random() - 0.5) * config.speed;
                this.vy = (Math.random() - 0.5) * config.speed;
                this.history = [];
                this.maxHistory = Math.floor(Math.random() * 15) + 10;
                this.color = config.colors[Math.floor(Math.random() * config.colors.length)];
                this.size = Math.random() * config.size + 1;
            }
            update() {
                this.history.push({x: this.x, y: this.y});
                if (this.history.length > this.maxHistory) this.history.shift();
                
                if (config.style === 'fluid') {
                    const n = Math.sin(this.x * 0.004) + Math.cos(this.y * 0.004);
                    this.vx += Math.cos(n * Math.PI) * 0.2;
                    this.vy += Math.sin(n * Math.PI) * 0.2;
                } else if (config.style === 'chaotic') {
                    this.vx += (Math.random() - 0.5) * 1.2;
                    this.vy += (Math.random() - 0.5) * 1.2;
                }
                
                this.x += this.vx; this.y += this.vy;
                this.vx *= 0.97; this.vy *= 0.97;
                if (this.x < -50 || this.x > width + 50 || this.y < -50 || this.y > height + 50) this.reset();
            }
            draw() {
                if (this.history.length < 2) return;
                ctx.beginPath();
                ctx.strokeStyle = this.color;
                ctx.lineWidth = this.size;
                ctx.lineCap = 'round';
                ctx.moveTo(this.history[0].x, this.history[0].y);
                for (let i = 1; i < this.history.length; i++) ctx.lineTo(this.history[i].x, this.history[i].y);
                ctx.stroke();
            }
        }

        function createParticles() {
            particles = [];
            const count = 60 + (config.complexity * 20);
            for (let i = 0; i < count; i++) particles.push(new Particle());
        }
        createParticles();

        // --- UI Logic ---
        toggleExpand.addEventListener('click', () => {
            expandArea.classList.toggle('hidden');
            expandIcon.style.transform = expandArea.classList.contains('hidden') ? 'rotate(0deg)' : 'rotate(180deg)';
        });

        // --- AI API ---
        async function generateArt() {
            const prompt = userInput.value.trim();
            if (!prompt) return;
            generateBtn.disabled = true;
            statusLabel.textContent = "思考中...";
            document.getElementById('loadingBar').classList.remove('hidden');

            const sys = "Convert text to digital art parameters. JSON only: {colors:[3-5 hex codes], speed:0.1-5, complexity:1-10, size:1-15, style:'fluid'|'chaotic'|'geometric'|'float', background:hex}";
            try {
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        contents: [{ parts: [{ text: `Prompt: "${prompt}"` }] }],
                        systemInstruction: { parts: [{ text: sys }] },
                        generationConfig: { responseMimeType: "application/json" }
                    })
                });
                const data = await response.json();
                config = JSON.parse(data.candidates[0].content.parts[0].text);
                createParticles();
                statusLabel.textContent = prompt;
                if (!expandArea.classList.contains('hidden')) toggleExpand.click();
            } catch (e) {
                statusLabel.textContent = "エラー";
            } finally {
                generateBtn.disabled = false;
                document.getElementById('loadingBar').classList.add('hidden');
            }
        }

        // --- Voice Logic ---
        const Speech = window.SpeechRecognition || window.webkitSpeechRecognition;
        if (Speech) {
            const rec = new Speech();
            rec.lang = 'ja-JP';
            rec.onstart = () => { statusLabel.textContent = "音声入力中..."; indicatorText.textContent = "聞き取り中"; statusIndicator.classList.remove('hidden'); };
            rec.onresult = (e) => { userInput.value = e.results[0][0].transcript; generateArt(); };
            rec.onend = () => { if(!isRecording) statusIndicator.classList.add('hidden'); };
            micBtn.onclick = () => rec.start();
        }

        // --- Download Functions ---
        saveImgBtn.onclick = () => {
            const link = document.createElement('a');
            link.download = `art-${Date.now()}.png`;
            link.href = canvas.toDataURL('image/png');
            link.click();
            statusLabel.textContent = "画像を保存しました";
        };

        async function startTimedRecording(seconds) {
            if (isRecording) return;
            recordedChunks = [];
            const stream = canvas.captureStream(30);
            
            // Try different mimeTypes for mobile compatibility
            const types = ['video/mp4', 'video/webm;codecs=vp9', 'video/webm'];
            let selectedType = types.find(t => MediaRecorder.isTypeSupported(t)) || '';
            
            mediaRecorder = new MediaRecorder(stream, { mimeType: selectedType });
            mediaRecorder.ondataavailable = (e) => { if (e.data.size > 0) recordedChunks.push(e.data); };
            mediaRecorder.onstop = () => {
                const blob = new Blob(recordedChunks, { type: selectedType || 'video/webm' });
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = `art-video-${Date.now()}.mp4`;
                document.body.appendChild(a);
                a.click();
                window.URL.revokeObjectURL(url);
                clearInterval(timerInterval);
                isRecording = false;
                statusIndicator.classList.add('hidden');
                statusLabel.textContent = "動画を保存しました";
            };

            mediaRecorder.start();
            isRecording = true;
            startTime = Date.now();
            indicatorText.textContent = "10秒録画中";
            statusIndicator.classList.remove('hidden');

            timerInterval = setInterval(() => {
                const elapsed = Math.floor((Date.now() - startTime) / 1000);
                timerDisplay.textContent = `00:${elapsed.toString().padStart(2, '0')}`;
                if (elapsed >= seconds) mediaRecorder.stop();
            }, 1000);
        }

        record10Btn.onclick = () => startTimedRecording(10);

        // --- Animation Loop ---
        function animate() {
            ctx.fillStyle = config.background;
            ctx.globalAlpha = 0.08;
            ctx.fillRect(0, 0, width, height);
            ctx.globalAlpha = 1.0;
            particles.forEach(p => { p.update(); p.draw(); });
            requestAnimationFrame(animate);
        }

        generateBtn.onclick = generateArt;
        animate();
    </script>
</body>
</html>
