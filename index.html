<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AI Art Canvas - Auto Cycle Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #050505;
            color: #fff;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }
        canvas {
            position: absolute;
            top: 0;
            left: 0;
            z-index: 0;
            touch-action: none;
        }
        .glass {
            background: rgba(15, 15, 15, 0.85);
            backdrop-filter: blur(25px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        .recording-dot {
            width: 10px;
            height: 10px;
            background-color: #ef4444;
            border-radius: 50%;
            display: inline-block;
            margin-right: 6px;
            animation: pulse 1s infinite;
        }
        @keyframes pulse {
            0% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.4; transform: scale(1.2); }
            100% { opacity: 1; transform: scale(1); }
        }
        @media (max-width: 640px) {
            .control-panel {
                width: 95%;
                bottom: 10px;
            }
        }
        textarea::placeholder {
            color: rgba(255, 255, 255, 0.2);
        }
        .settings-pane {
            max-height: 0;
            overflow: hidden;
            transition: max-height 0.4s ease-out;
        }
        .settings-pane.open {
            max-height: 400px;
        }
        .help-content {
            font-size: 11px;
            line-height: 1.6;
            color: #9ca3af;
        }
        .auto-progress {
            position: absolute;
            bottom: 0;
            left: 0;
            height: 2px;
            background: #6366f1;
            transition: width 1s linear;
        }
    </style>
</head>
<body>

    <canvas id="artCanvas"></canvas>

    <!-- Top Status Bar -->
    <div id="uiOverlay" class="fixed top-4 left-0 right-0 z-30 flex justify-center pointer-events-none">
        <div id="statusIndicator" class="hidden glass px-4 py-2 rounded-full flex items-center text-xs font-medium shadow-lg pointer-events-auto">
            <span id="indicatorDot" class="recording-dot"></span> <span id="indicatorText">録画中...</span>
            <span id="timer" class="ml-2 font-mono">00:00</span>
        </div>
    </div>

    <!-- Bottom Controls -->
    <div class="fixed bottom-6 left-0 right-0 z-30 flex justify-center px-4 pointer-events-none">
        <div id="panel" class="control-panel glass p-5 rounded-[2.5rem] w-full max-w-lg pointer-events-auto shadow-2xl transition-all duration-500 overflow-hidden">
            
            <!-- Auto Cycle Progress Bar -->
            <div id="autoProgressBar" class="auto-progress w-0"></div>

            <!-- API Key Settings -->
            <div id="settingsPane" class="settings-pane mb-4 border-b border-white/10 pb-4">
                <div class="flex justify-between items-center mb-2">
                    <label class="text-[10px] text-gray-400 uppercase tracking-widest block">API Key Settings</label>
                    <button id="toggleHelp" class="text-[10px] text-indigo-400 hover:underline">取得方法はこちら</button>
                </div>
                
                <div class="flex gap-2 mb-3">
                    <input 
                        type="password" 
                        id="apiKeyInput" 
                        placeholder="Gemini API Keyを入力..." 
                        class="flex-1 bg-white/5 border border-white/10 rounded-xl px-4 py-2 text-xs outline-none focus:border-indigo-500 text-white"
                    >
                    <button id="saveKeyBtn" class="bg-indigo-600 px-4 py-2 rounded-xl text-xs font-bold hover:bg-indigo-500 transition-colors">保存</button>
                </div>

                <div id="helpSection" class="hidden bg-white/5 p-3 rounded-xl help-content">
                    <p class="font-bold text-white mb-1">APIキーの取得ステップ：</p>
                    <ol class="list-decimal list-inside space-y-1 text-xs">
                        <li><a href="https://aistudio.google.com/app/apikey" target="_blank" class="text-indigo-400 underline">Google AI Studio</a>へ。</li>
                        <li>「Get API key」をクリック。</li>
                        <li>キーをコピーして、ここに貼り付けて「保存」。</li>
                    </ol>
                </div>
            </div>

            <div id="expandArea" class="mb-4 space-y-4 block">
                <div class="relative">
                    <textarea 
                        id="userInput" 
                        placeholder="イメージを言葉に（例：サイバーパンクな都市の雨）" 
                        class="w-full bg-white/5 border border-white/10 rounded-2xl focus:border-indigo-400 focus:bg-white/10 p-4 text-base outline-none resize-none h-28 transition-all pr-12 text-white"
                    ></textarea>
                    <button id="micBtn" class="absolute right-2 bottom-3 p-3 text-gray-400 hover:text-indigo-400 transition-colors active:scale-90">
                        <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2a3 3 0 0 0-3 3v7a3 3 0 0 0 6 0V5a3 3 0 0 0-3-3Z"/><path d="M19 10v2a7 7 0 0 1-14 0v-2"/><line x1="12" x2="12" y1="19" y2="22"/></svg>
                    </button>
                </div>

                <div class="grid grid-cols-3 gap-2">
                    <button id="saveImgBtn" class="py-3 px-2 glass rounded-2xl text-[10px] font-semibold hover:bg-white/10 flex flex-col items-center justify-center gap-1 active:scale-95 transition-transform">
                        <svg width="16" height="16" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
                        画像保存
                    </button>
                    <button id="record10Btn" class="py-3 px-2 glass rounded-2xl text-[10px] font-semibold hover:bg-white/10 flex flex-col items-center justify-center gap-1 active:scale-95 transition-transform">
                        <svg width="16" height="16" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M15 10l4.553-2.276A1 1 0 0121 8.618v6.764a1 1 0 01-1.447.894L15 14M5 18h8a2 2 0 002-2V8a2 2 0 00-2-2H5a2 2 0 00-2 2v8a2 2 0 002 2z" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
                        10秒動画
                    </button>
                    <button id="autoToggleBtn" class="py-3 px-2 glass rounded-2xl text-[10px] font-semibold bg-indigo-500/20 border-indigo-500/50 flex flex-col items-center justify-center gap-1 active:scale-95 transition-transform">
                        <svg width="16" height="16" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
                        <span id="autoStatusText">自動変化: ON</span>
                    </button>
                </div>
            </div>

            <div class="flex items-center gap-3">
                <button id="toggleSettings" class="p-2 text-gray-500 hover:text-indigo-400 transition-colors" title="APIキー設定">
                    <svg width="20" height="20" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/><path d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
                </button>
                <div id="statusLabel" class="flex-1 text-[10px] text-gray-400 uppercase tracking-widest truncate cursor-pointer py-2">言葉を入力してください</div>
                <button 
                    id="generateBtn" 
                    class="bg-white text-black px-8 py-3 rounded-full font-bold text-sm shadow-xl hover:bg-indigo-50 active:scale-90 transition-all"
                >
                    生成
                </button>
            </div>
        </div>
    </div>

    <!-- Error Toast -->
    <div id="errorToast" class="fixed top-20 left-1/2 -translate-x-1/2 z-50 glass px-6 py-3 rounded-2xl text-red-400 text-sm hidden flex items-center gap-2 shadow-2xl border border-red-500/30">
        <svg width="20" height="20" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
        <span id="errorMessage">エラー</span>
    </div>

    <script>
        const envApiKey = ""; 
        const getApiKey = () => envApiKey || localStorage.getItem('gemini_api_key') || "";

        const canvas = document.getElementById('artCanvas');
        const ctx = canvas.getContext('2d');
        const userInput = document.getElementById('userInput');
        const generateBtn = document.getElementById('generateBtn');
        const micBtn = document.getElementById('micBtn');
        const saveImgBtn = document.getElementById('saveImgBtn');
        const record10Btn = document.getElementById('record10Btn');
        const autoToggleBtn = document.getElementById('autoToggleBtn');
        const autoStatusText = document.getElementById('autoStatusText');
        const autoProgressBar = document.getElementById('autoProgressBar');
        const statusLabel = document.getElementById('statusLabel');
        const statusIndicator = document.getElementById('statusIndicator');
        const timerDisplay = document.getElementById('timer');
        const indicatorText = document.getElementById('indicatorText');
        const settingsPane = document.getElementById('settingsPane');
        const toggleSettings = document.getElementById('toggleSettings');
        const toggleHelp = document.getElementById('toggleHelp');
        const helpSection = document.getElementById('helpSection');
        const apiKeyInput = document.getElementById('apiKeyInput');
        const saveKeyBtn = document.getElementById('saveKeyBtn');

        let width, height;
        let particles = [];
        let config = {
            colors: ['#3b82f6', '#8b5cf6', '#ec4899'],
            speed: 1.5,
            complexity: 6,
            size: 3,
            style: 'fluid',
            background: '#050505'
        };

        // Auto Cycle State
        let isAutoCycling = true;
        let autoCycleSeconds = 0;
        const CYCLE_DURATION = 10;

        // Palettes for randomizer
        const PALETTES = [
            ['#3b82f6', '#8b5cf6', '#ec4899'], // Cyber
            ['#10b981', '#3b82f6', '#06b6d4'], // Ocean
            ['#f59e0b', '#ef4444', '#f97316'], // Fire
            ['#ffffff', '#9ca3af', '#374151'], // Mono
            ['#a855f7', '#ec4899', '#f43f5e'], // Dream
            ['#22c55e', '#84cc16', '#10b981'], // Forest
            ['#eab308', '#f97316', '#ef4444'], // Sunset
            ['#6366f1', '#4f46e5', '#4338ca']  // Deep Blue
        ];

        let mediaRecorder;
        let recordedChunks = [];
        let isRecording = false;

        function init() {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
            ctx.fillStyle = config.background;
            ctx.fillRect(0, 0, width, height);
            apiKeyInput.value = localStorage.getItem('gemini_api_key') || "";
            applyRandomConfig();
        }
        window.addEventListener('resize', init);

        // --- Randomizer Logic ---
        function applyRandomConfig() {
            const styles = ['fluid', 'chaotic', 'geometric', 'float'];
            config.colors = PALETTES[Math.floor(Math.random() * PALETTES.length)];
            config.style = styles[Math.floor(Math.random() * styles.length)];
            config.speed = 0.5 + Math.random() * 2.5;
            config.complexity = 4 + Math.floor(Math.random() * 6);
            config.size = 2 + Math.random() * 8;
            createParticles();
            statusLabel.textContent = "ランダム生成中...";
        }

        // --- Settings Logic ---
        toggleSettings.addEventListener('click', () => settingsPane.classList.toggle('open'));
        toggleHelp.addEventListener('click', () => helpSection.classList.toggle('hidden'));
        saveKeyBtn.addEventListener('click', () => {
            localStorage.setItem('gemini_api_key', apiKeyInput.value.trim());
            settingsPane.classList.remove('open');
            statusLabel.textContent = "APIキーを保存しました";
        });

        autoToggleBtn.addEventListener('click', () => {
            isAutoCycling = !isAutoCycling;
            autoStatusText.textContent = `自動変化: ${isAutoCycling ? 'ON' : 'OFF'}`;
            autoToggleBtn.classList.toggle('bg-indigo-500/20', isAutoCycling);
            autoToggleBtn.classList.toggle('border-indigo-500/50', isAutoCycling);
            autoCycleSeconds = 0;
            autoProgressBar.style.width = '0%';
        });

        // --- Particle Logic ---
        class Particle {
            constructor() { this.reset(); }
            reset() {
                this.x = Math.random() * width;
                this.y = Math.random() * height;
                this.vx = (Math.random() - 0.5) * config.speed;
                this.vy = (Math.random() - 0.5) * config.speed;
                this.history = [];
                this.maxHistory = Math.floor(Math.random() * 20) + 15;
                this.color = config.colors[Math.floor(Math.random() * config.colors.length)];
                this.size = Math.random() * config.size + 1;
            }
            update() {
                this.history.push({x: this.x, y: this.y});
                if (this.history.length > this.maxHistory) this.history.shift();
                if (config.style === 'fluid') {
                    const n = Math.sin(this.x * 0.003) + Math.cos(this.y * 0.003);
                    this.vx += Math.cos(n * Math.PI) * 0.25;
                    this.vy += Math.sin(n * Math.PI) * 0.25;
                } else if (config.style === 'chaotic') {
                    this.vx += (Math.random() - 0.5) * 1.5;
                    this.vy += (Math.random() - 0.5) * 1.5;
                } else if (config.style === 'float') {
                    this.vy -= 0.05;
                    this.vx += Math.sin(Date.now() * 0.001 + this.x) * 0.05;
                }
                this.x += this.vx; this.y += this.vy;
                this.vx *= 0.96; this.vy *= 0.96;
                if (this.x < -100 || this.x > width + 100 || this.y < -100 || this.y > height + 100) this.reset();
            }
            draw() {
                if (this.history.length < 2) return;
                ctx.beginPath(); ctx.strokeStyle = this.color; ctx.lineWidth = this.size;
                ctx.lineCap = 'round'; ctx.lineJoin = 'round';
                ctx.moveTo(this.history[0].x, this.history[0].y);
                for (let i = 1; i < this.history.length; i++) ctx.lineTo(this.history[i].x, this.history[i].y);
                ctx.stroke();
            }
        }

        function createParticles() {
            particles = [];
            const count = 70 + (config.complexity * 25);
            for (let i = 0; i < count; i++) particles.push(new Particle());
        }

        async function generateArt() {
            const prompt = userInput.value.trim();
            const key = getApiKey();
            if (!prompt) return;
            if (!key) {
                settingsPane.classList.add('open');
                statusLabel.textContent = "APIキーを設定してください";
                return;
            }
            
            isAutoCycling = false; // Stop auto cycle when user generates manually
            autoStatusText.textContent = `自動変化: OFF`;
            autoToggleBtn.classList.remove('bg-indigo-500/20', 'border-indigo-500/50');

            generateBtn.disabled = true;
            statusLabel.textContent = "AIが創造しています...";
            const sys = "Convert text to art params. Return ONLY JSON: {colors:[hex], speed:0.1-5, complexity:1-10, size:1-15, style:'fluid'|'chaotic'|'geometric'|'float', background:'#050505'}";
            try {
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${key}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        contents: [{ parts: [{ text: `Prompt: "${prompt}"` }] }],
                        systemInstruction: { parts: [{ text: sys }] },
                        generationConfig: { responseMimeType: "application/json" }
                    })
                });
                const data = await response.json();
                config = JSON.parse(data.candidates[0].content.parts[0].text);
                createParticles();
                statusLabel.textContent = prompt;
            } catch (e) {
                statusLabel.textContent = "APIエラー";
            } finally {
                generateBtn.disabled = false;
            }
        }

        // --- Auto Cycle Timer ---
        setInterval(() => {
            if (isAutoCycling && !isRecording) {
                autoCycleSeconds++;
                const progress = (autoCycleSeconds / CYCLE_DURATION) * 100;
                autoProgressBar.style.width = `${progress}%`;
                
                if (autoCycleSeconds >= CYCLE_DURATION) {
                    autoCycleSeconds = 0;
                    applyRandomConfig();
                    autoProgressBar.style.width = '0%';
                }
            }
        }, 1000);

        // --- Downloads ---
        saveImgBtn.onclick = () => {
            const link = document.createElement('a');
            link.download = `art-${Date.now()}.png`;
            link.href = canvas.toDataURL('image/png');
            link.click();
        };

        async function startTimedRecording(seconds) {
            if (isRecording) return;
            recordedChunks = [];
            const stream = canvas.captureStream(30);
            const type = MediaRecorder.isTypeSupported('video/mp4') ? 'video/mp4' : 'video/webm';
            mediaRecorder = new MediaRecorder(stream, { mimeType: type });
            mediaRecorder.ondataavailable = (e) => { if (e.data.size > 0) recordedChunks.push(e.data); };
            mediaRecorder.onstop = () => {
                const blob = new Blob(recordedChunks, { type });
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a'); a.href = url; a.download = `art-${Date.now()}.mp4`;
                document.body.appendChild(a); a.click();
                isRecording = false;
                statusIndicator.classList.add('hidden');
            };
            mediaRecorder.start();
            isRecording = true;
            let start = Date.now();
            statusIndicator.classList.remove('hidden');
            let timer = setInterval(() => {
                let elapsed = Math.floor((Date.now() - start) / 1000);
                timerDisplay.textContent = `00:${(seconds - elapsed).toString().padStart(2, '0')}`;
                if (elapsed >= seconds) { mediaRecorder.stop(); clearInterval(timer); }
            }, 1000);
        }

        record10Btn.onclick = () => startTimedRecording(10);
        generateBtn.onclick = generateArt;

        function animate() {
            ctx.fillStyle = config.background; ctx.globalAlpha = 0.08;
            ctx.fillRect(0, 0, width, height); ctx.globalAlpha = 1.0;
            particles.forEach(p => { p.update(); p.draw(); });
            requestAnimationFrame(animate);
        }

        init();
        animate();
    </script>
</body>
</html>
