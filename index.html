<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AI Art Canvas - Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #050505;
            color: #fff;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }
        canvas {
            position: absolute;
            top: 0;
            left: 0;
            z-index: 0;
            touch-action: none;
        }
        .glass {
            background: rgba(15, 15, 15, 0.85);
            backdrop-filter: blur(25px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        .recording-dot {
            width: 10px;
            height: 10px;
            background-color: #ef4444;
            border-radius: 50%;
            display: inline-block;
            margin-right: 6px;
            animation: pulse 1s infinite;
        }
        @keyframes pulse {
            0% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.4; transform: scale(1.2); }
            100% { opacity: 1; transform: scale(1); }
        }
        @media (max-width: 640px) {
            .control-panel {
                width: 95%;
                bottom: 10px;
            }
        }
        textarea::placeholder {
            color: rgba(255, 255, 255, 0.3);
        }
        .error-shake {
            animation: shake 0.5s cubic-bezier(.36,.07,.19,.97) both;
        }
        @keyframes shake {
            10%, 90% { transform: translate3d(-1px, 0, 0); }
            20%, 80% { transform: translate3d(2px, 0, 0); }
            30%, 50%, 70% { transform: translate3d(-4px, 0, 0); }
            40%, 60% { transform: translate3d(4px, 0, 0); }
        }
    </style>
</head>
<body>

    <canvas id="artCanvas"></canvas>

    <!-- Top Status Bar -->
    <div id="uiOverlay" class="fixed top-4 left-0 right-0 z-30 flex justify-center pointer-events-none">
        <div id="statusIndicator" class="hidden glass px-4 py-2 rounded-full flex items-center text-xs font-medium shadow-lg pointer-events-auto">
            <span id="indicatorDot" class="recording-dot"></span> <span id="indicatorText">録画中...</span>
            <span id="timer" class="ml-2 font-mono">00:00</span>
        </div>
    </div>

    <!-- Bottom Controls -->
    <div class="fixed bottom-6 left-0 right-0 z-30 flex justify-center px-4 pointer-events-none">
        <div id="panel" class="control-panel glass p-5 rounded-[2.5rem] w-full max-w-lg pointer-events-auto shadow-2xl transition-all duration-500">
            
            <div id="expandArea" class="mb-4 space-y-4 block">
                <div class="relative">
                    <textarea 
                        id="userInput" 
                        placeholder="どんなアートを作りたいですか？（例：銀河の渦と輝き）" 
                        class="w-full bg-white/5 border border-white/10 rounded-2xl focus:border-indigo-400 focus:bg-white/10 p-4 text-base outline-none resize-none h-28 transition-all pr-12 text-white"
                    ></textarea>
                    <button id="micBtn" class="absolute right-2 bottom-3 p-3 text-gray-400 hover:text-indigo-400 transition-colors active:scale-90">
                        <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2a3 3 0 0 0-3 3v7a3 3 0 0 0 6 0V5a3 3 0 0 0-3-3Z"/><path d="M19 10v2a7 7 0 0 1-14 0v-2"/><line x1="12" x2="12" y1="19" y2="22"/></svg>
                    </button>
                </div>

                <div class="grid grid-cols-2 gap-3">
                    <button id="saveImgBtn" class="py-3 px-4 glass rounded-2xl text-xs font-semibold hover:bg-white/10 flex items-center justify-center gap-2 active:scale-95 transition-transform">
                        <svg width="18" height="18" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
                        画像を保存
                    </button>
                    <button id="record10Btn" class="py-3 px-4 glass rounded-2xl text-xs font-semibold hover:bg-white/10 flex items-center justify-center gap-2 active:scale-95 transition-transform">
                        <svg width="18" height="18" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M15 10l4.553-2.276A1 1 0 0121 8.618v6.764a1 1 0 01-1.447.894L15 14M5 18h8a2 2 0 002-2V8a2 2 0 00-2-2H5a2 2 0 00-2 2v8a2 2 0 002 2z" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
                        10秒動画
                    </button>
                </div>
            </div>

            <div class="flex items-center gap-3">
                <button id="toggleExpand" class="p-2 text-gray-400 hover:text-white transition-colors">
                    <svg id="expandIcon" class="transform rotate-180 transition-transform duration-300" width="24" height="24" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M5 15l7-7 7 7" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
                </button>
                <div id="statusLabel" class="flex-1 text-[10px] text-gray-400 uppercase tracking-widest truncate cursor-pointer py-2">言葉を入力してください</div>
                <button 
                    id="generateBtn" 
                    class="bg-white text-black px-8 py-3 rounded-full font-bold text-sm shadow-xl hover:bg-indigo-50 active:scale-90 transition-all flex items-center gap-2"
                >
                    <span id="btnText">生成</span>
                </button>
            </div>
        </div>
    </div>

    <!-- Error Toast -->
    <div id="errorToast" class="fixed top-20 left-1/2 -translate-x-1/2 z-50 glass px-6 py-3 rounded-2xl text-red-400 text-sm hidden flex items-center gap-2 shadow-2xl border border-red-500/30">
        <svg width="20" height="20" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
        <span id="errorMessage">エラーが発生しました</span>
    </div>

    <!-- Loading progress -->
    <div id="loadingBar" class="hidden fixed bottom-0 left-0 right-0 h-1.5 bg-indigo-900 z-50">
        <div class="h-full bg-indigo-400 w-full animate-[loading_2s_infinite]"></div>
    </div>

    <style>
        @keyframes loading {
            0% { transform: translateX(-100%); }
            100% { transform: translateX(100%); }
        }
    </style>

    <script>
        const apiKey = "";
        const canvas = document.getElementById('artCanvas');
        const ctx = canvas.getContext('2d');
        const userInput = document.getElementById('userInput');
        const generateBtn = document.getElementById('generateBtn');
        const micBtn = document.getElementById('micBtn');
        const saveImgBtn = document.getElementById('saveImgBtn');
        const record10Btn = document.getElementById('record10Btn');
        const toggleExpand = document.getElementById('toggleExpand');
        const expandArea = document.getElementById('expandArea');
        const expandIcon = document.getElementById('expandIcon');
        const statusLabel = document.getElementById('statusLabel');
        const statusIndicator = document.getElementById('statusIndicator');
        const timerDisplay = document.getElementById('timer');
        const indicatorText = document.getElementById('indicatorText');
        const errorToast = document.getElementById('errorToast');
        const errorMessage = document.getElementById('errorMessage');

        let width, height;
        let particles = [];
        let config = {
            colors: ['#444', '#888', '#bbb'],
            speed: 1.5,
            complexity: 6,
            size: 3,
            style: 'fluid',
            background: '#050505'
        };

        let mediaRecorder;
        let recordedChunks = [];
        let isRecording = false;
        let timerInterval;

        function init() {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
            ctx.fillStyle = config.background;
            ctx.fillRect(0, 0, width, height);
        }
        window.addEventListener('resize', init);
        init();

        class Particle {
            constructor() { this.reset(); }
            reset() {
                this.x = Math.random() * width;
                this.y = Math.random() * height;
                this.vx = (Math.random() - 0.5) * config.speed;
                this.vy = (Math.random() - 0.5) * config.speed;
                this.history = [];
                this.maxHistory = Math.floor(Math.random() * 20) + 15;
                this.color = config.colors[Math.floor(Math.random() * config.colors.length)];
                this.size = Math.random() * config.size + 1;
            }
            update() {
                this.history.push({x: this.x, y: this.y});
                if (this.history.length > this.maxHistory) this.history.shift();
                
                if (config.style === 'fluid') {
                    const n = Math.sin(this.x * 0.003) + Math.cos(this.y * 0.003);
                    this.vx += Math.cos(n * Math.PI) * 0.25;
                    this.vy += Math.sin(n * Math.PI) * 0.25;
                } else if (config.style === 'chaotic') {
                    this.vx += (Math.random() - 0.5) * 1.5;
                    this.vy += (Math.random() - 0.5) * 1.5;
                } else if (config.style === 'float') {
                    this.vy -= 0.08;
                    this.vx += Math.sin(Date.now() * 0.001 + this.x) * 0.1;
                }
                
                this.x += this.vx; this.y += this.vy;
                this.vx *= 0.96; this.vy *= 0.96;
                if (this.x < -100 || this.x > width + 100 || this.y < -100 || this.y > height + 100) this.reset();
            }
            draw() {
                if (this.history.length < 2) return;
                ctx.beginPath();
                ctx.strokeStyle = this.color;
                ctx.lineWidth = this.size;
                ctx.lineCap = 'round';
                ctx.lineJoin = 'round';
                ctx.moveTo(this.history[0].x, this.history[0].y);
                for (let i = 1; i < this.history.length; i++) ctx.lineTo(this.history[i].x, this.history[i].y);
                ctx.stroke();
            }
        }

        function createParticles() {
            particles = [];
            const count = 70 + (config.complexity * 25);
            for (let i = 0; i < count; i++) particles.push(new Particle());
        }
        createParticles();

        function toggleInput() {
            const isHidden = expandArea.style.display === 'none';
            expandArea.style.display = isHidden ? 'block' : 'none';
            expandIcon.classList.toggle('rotate-180', isHidden);
            if (isHidden) userInput.focus();
        }
        toggleExpand.addEventListener('click', toggleInput);

        // Fetch with Retry & Backoff
        async function fetchWithRetry(url, options, retries = 5, backoff = 1000) {
            try {
                const response = await fetch(url, options);
                if (!response.ok) throw new Error(`HTTP ${response.status}`);
                return response;
            } catch (err) {
                if (retries <= 0) throw err;
                await new Promise(resolve => setTimeout(resolve, backoff));
                return fetchWithRetry(url, options, retries - 1, backoff * 2);
            }
        }

        function showError(msg) {
            errorMessage.textContent = msg;
            errorToast.classList.remove('hidden');
            document.getElementById('panel').classList.add('error-shake');
            setTimeout(() => {
                errorToast.classList.add('hidden');
                document.getElementById('panel').classList.remove('error-shake');
            }, 5000);
        }

        async function generateArt() {
            const prompt = userInput.value.trim();
            if (!prompt) return;
            
            generateBtn.disabled = true;
            statusLabel.textContent = "AIが創造しています...";
            document.getElementById('loadingBar').classList.remove('hidden');
            errorToast.classList.add('hidden');

            const systemPrompt = "Convert text to digital art parameters. Return ONLY a JSON object: {colors:[3-5 hex strings], speed:0.1-5, complexity:1-10, size:1-15, style:'fluid'|'chaotic'|'geometric'|'float', background:hex}";
            const payload = {
                contents: [{ parts: [{ text: `User prompt: "${prompt}"` }] }],
                systemInstruction: { parts: [{ text: systemPrompt }] },
                generationConfig: { 
                    responseMimeType: "application/json",
                    temperature: 0.7
                }
            };

            try {
                const response = await fetchWithRetry(
                    `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`,
                    {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(payload)
                    }
                );
                
                const data = await response.json();
                if (data.candidates && data.candidates[0].content.parts[0].text) {
                    const res = JSON.parse(data.candidates[0].content.parts[0].text);
                    config = { ...config, ...res };
                    createParticles();
                    statusLabel.textContent = prompt;
                    if (window.innerWidth < 768) toggleInput();
                } else {
                    throw new Error("Invalid API response");
                }
            } catch (e) {
                console.error(e);
                showError("接続に失敗しました。時間をおいて再度お試しください。");
                statusLabel.textContent = "エラーが発生しました";
            } finally {
                generateBtn.disabled = false;
                document.getElementById('loadingBar').classList.add('hidden');
            }
        }

        // Voice
        const Speech = window.SpeechRecognition || window.webkitSpeechRecognition;
        if (Speech) {
            const rec = new Speech();
            rec.lang = 'ja-JP';
            rec.onstart = () => { indicatorText.textContent = "音声聞き取り中"; statusIndicator.classList.remove('hidden'); };
            rec.onresult = (e) => { userInput.value = e.results[0][0].transcript; generateArt(); };
            rec.onend = () => { if(!isRecording) statusIndicator.classList.add('hidden'); };
            micBtn.onclick = () => rec.start();
        }

        saveImgBtn.onclick = () => {
            const link = document.createElement('a');
            link.download = `art-${Date.now()}.png`;
            link.href = canvas.toDataURL('image/png');
            link.click();
        };

        async function startTimedRecording(seconds) {
            if (isRecording) return;
            recordedChunks = [];
            const stream = canvas.captureStream(30);
            const types = ['video/mp4', 'video/webm;codecs=vp9', 'video/webm'];
            const type = types.find(t => MediaRecorder.isTypeSupported(t)) || '';
            
            mediaRecorder = new MediaRecorder(stream, { mimeType: type });
            mediaRecorder.ondataavailable = (e) => { if (e.data.size > 0) recordedChunks.push(e.data); };
            mediaRecorder.onstop = () => {
                const blob = new Blob(recordedChunks, { type: type || 'video/webm' });
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url; a.download = `art-${Date.now()}.mp4`;
                document.body.appendChild(a); a.click();
                window.URL.revokeObjectURL(url);
                clearInterval(timerInterval);
                isRecording = false;
                statusIndicator.classList.add('hidden');
            };

            mediaRecorder.start();
            isRecording = true;
            let start = Date.now();
            indicatorText.textContent = "録画中";
            statusIndicator.classList.remove('hidden');

            timerInterval = setInterval(() => {
                const elapsed = Math.floor((Date.now() - start) / 1000);
                timerDisplay.textContent = `00:${(seconds - elapsed).toString().padStart(2, '0')}`;
                if (elapsed >= seconds) mediaRecorder.stop();
            }, 1000);
        }

        record10Btn.onclick = () => startTimedRecording(10);
        generateBtn.onclick = generateArt;
        userInput.onkeydown = (e) => { if(e.key === 'Enter' && e.ctrlKey) generateArt(); };

        function animate() {
            ctx.fillStyle = config.background;
            ctx.globalAlpha = 0.08;
            ctx.fillRect(0, 0, width, height);
            ctx.globalAlpha = 1.0;
            particles.forEach(p => { p.update(); p.draw(); });
            requestAnimationFrame(animate);
        }
        animate();
    </script>
</body>
</html>
